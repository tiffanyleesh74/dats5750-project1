<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>TechEssentials</h1>
        <p>Curated gear for the modern desk.</p>
    </header>

    <main class="product-grid">
        <!-- Product 1 -->
        <div class="card">
            <img src="https://storage.googleapis.com/project-1-images-tiffany7/01.jpg" alt="Laptop">
            <div class="card-content">
                <h3>Ultra-Slim Laptop</h3>
                <p class="price">$1,299.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="card">
            <img src="https://storage.googleapis.com/project-1-images-tiffany7/02.jpg" alt="Keyboard">
            <div class="card-content">
                <h3>Mechanical Keyboard</h3>
                <p class="price">$145.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="card">
            <img src="https://storage.googleapis.com/project-1-images-tiffany7/03.jpg" alt="Tablet">
            <div class="card-content">
                <h3>Pro Tablet 11"</h3>
                <p class="price">$799.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="card">
            <img src="https://storage.googleapis.com/project-1-images-tiffany7/04.jpg" alt="Gadget">
            <div class="card-content">
                <h3>Smart Desk Lamp</h3>
                <p class="price">$89.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>

        <!-- Product 5 -->
        <div class="card">
            <img src="https://storage.googleapis.com/project-1-images-tiffany7/05.jpg" alt="Headphones">
            <div class="card-content">
                <h3>Noise Cancelling Buds</h3>
                <p class="price">$199.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>
    </main>

</body>
</html>
